<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peakly | 피클리</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5d6472;
      --accent: #4b6bfb;
      --border: #e6e9f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f7fb 0%, #eef2ff 100%);
      color: var(--text);
      word-break: keep-all;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 16px 40px rgba(59, 76, 143, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 44px;
      line-height: 1.05;
    }
    .tagline {
      margin: 0 0 28px;
      font-size: 18px;
      color: var(--muted);
    }
    p {
      margin: 0 0 16px;
      line-height: 1.7;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text);
      background: #fff;
    }
    .links a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    footer a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Peakly</h1>
      <p class="tagline">복약 흐름, 루틴, 일상 집중 관리를 한 곳에서.</p>
      <p>피클리는 복용 시간, 루틴, 할 일, 컨디션을 한 곳에서 기록하고 관리할 수 있도록 돕는 모바일 앱입니다.</p>
      <p>iOS와 Android에서 사용할 수 있으며, 선택형 구독 기능, 클라우드 백업, 기본 문의 채널을 제공합니다.</p>
      <p>개인정보처리방침과 서비스 이용약관은 아래 링크에서 확인하실 수 있습니다.</p>
      <div class="links">
        <a class="primary" href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">서비스 이용약관</a>
      </div>
    </section>
    <footer>
      문의: <a href="mailto:hyperfocuslab3813@gmail.com">hyperfocuslab3813@gmail.com</a>
    </footer>
  </main>
</body>
</html>
